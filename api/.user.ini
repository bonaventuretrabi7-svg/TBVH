; Relève les limites de taille de requête PHP pour ce dossier — nécessaire
; sur PHP-FPM/FastCGI (courant sur l'hébergement mutualisé, voir
; api/.htaccess) où les directives "php_value" d'un .htaccess n'ont AUCUN
; effet (seul un .user.ini, lu directement par PHP, fonctionne dans ce
; cas). Sans ça, une candidature partenaire (photo d'identité + code QR en
; base64 dans le corps JSON, voir prgSubmit(), js/client.js) pouvait
; dépasser la limite par défaut de l'hébergeur : la requête arrivait alors
; vide côté PHP (body() renvoie []), provoquant l'erreur trompeuse
; "Prénom, nom et téléphone requis" même quand le formulaire était
; correctement rempli.
post_max_size = 24M
upload_max_filesize = 24M
memory_limit = 128M
